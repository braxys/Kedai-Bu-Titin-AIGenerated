<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Bu Titin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbf7; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Script Module Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Mengekspos Firebase ke window agar bisa dibaca dengan aman oleh React
        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DELETE_PASSWORD = "butitin123";

        // Daftar Akun Pengguna
        const APP_USERS = [
            { name: 'Admin', role: 'ADMIN', pin: 'butitin123' },
            { name: 'Siti', role: 'KASIR', pin: '1111' },
            { name: 'Budi', role: 'KASIR', pin: '2222' }
        ];

        // Daftar Menu Otomatis (Harga Tetap)
        const MENU_FIXED = [
            { id: 'f1', name: 'Ayam Geprek 10k', price: 10000, icon: 'drumstick' },
            { id: 'f2', name: 'Ayam Geprek 12k', price: 12000, icon: 'drumstick' },
            { id: 'f3', name: 'Ayam Bakar', price: 12000, icon: 'flame' },
            { id: 'f4', name: 'Kue', price: 1000, icon: 'cake' },
            { id: 'f5', name: 'Tiwul', price: 13000, icon: 'bowl' }
        ];

        // Daftar Menu Manual (Harga Input Sendiri)
        const MENU_MANUAL = [
            { id: 'm1', name: 'Prasmanan', icon: 'utensils' },
            { id: 'm2', name: 'Kukusan', icon: 'soup' },
            { id: 'm3', name: 'Minuman', icon: 'cup-soda' }
        ];

        // 🔴 PENTING UNTUK VERCEL: Masukkan konfigurasi Firebase Anda di bawah ini
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDeAxdaokFnPsqDUAEBWBjjTjCTSXYk8U8",
            authDomain: "kedai-bu-titin.firebaseapp.com",
            projectId: "kedai-bu-titin",
            storageBucket: "kedai-bu-titin.firebasestorage.app",
            messagingSenderId: "735859710275",
            appId: "1:735859710275:web:4adca4554734f4f36cb7f6",
            measurementId: "G-0MN2Q7XH5Y"
        };

        // Komponen Icon yang aman untuk React
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            // --- STATE DECLARATIONS ---
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Tab State
            const [activeTab, setActiveTab] = useState('POS'); // 'POS', 'STOK', 'KEUANGAN'

            // Cart State
            const [cart, setCart] = useState([]);
            const [isQris, setIsQris] = useState(false);

            // Manual Input Modal State
            const [manualModal, setManualModal] = useState({ show: false, item: null });
            const [manualPriceInput, setManualPriceInput] = useState("");

            // Stock & Finance State (Today)
            const [dailyStock, setDailyStock] = useState({});
            const [dailyFinance, setDailyFinance] = useState({ uangLaci: 0 });

            // Session State
            const [activeSession, setActiveSession] = useState('SIANG'); // 'SIANG' atau 'MALAM'
            const [showSessionModal, setShowSessionModal] = useState(false);
            const [sessionSettings, setSessionSettings] = useState({ lastDate: getTodayDocId(), currentSession: 'SIANG' });

            // Global & User State
            const [activeUser, setActiveUser] = useState(null); 
            const [selectedUserForLogin, setSelectedUserForLogin] = useState(null); 
            const [isTempAdminUnlocked, setIsTempAdminUnlocked] = useState(false); 
            const [loginPin, setLoginPin] = useState("");
            const [loginError, setLoginError] = useState("");
            
            // Admin Action State
            const [pendingDeleteId, setPendingDeleteId] = useState(null);
            const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState("");
            const [adminError, setAdminError] = useState("");
            const passwordInputRef = useRef(null);

            // Toast Notifications
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            // Helper: Format Date for Document ID
            function getTodayDocId() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            // --- 1. INITIALIZE FIREBASE & AUTH ---
            useEffect(() => {
                const setupBackend = () => {
                    let configToUse = null;
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        configToUse = JSON.parse(__firebase_config); 
                    } else if (MY_FIREBASE_CONFIG.apiKey) {
                        configToUse = MY_FIREBASE_CONFIG; 
                    }

                    if (configToUse) {
                        const checkFirebase = setInterval(async () => {
                            if (window.FirebaseAPI) {
                                clearInterval(checkFirebase);
                                try {
                                    const fbAPI = window.FirebaseAPI;
                                    const app = fbAPI.initializeApp(configToUse);
                                    const auth = fbAPI.getAuth(app);
                                    const db = fbAPI.getFirestore(app);
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'kedai-bu-titin-pos';
                                    
                                    setFb({ 
                                        db, appId, 
                                        collection: fbAPI.collection, 
                                        onSnapshot: fbAPI.onSnapshot, 
                                        addDoc: fbAPI.addDoc, 
                                        deleteDoc: fbAPI.deleteDoc, 
                                        doc: fbAPI.doc,
                                        setDoc: fbAPI.setDoc
                                    });

                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await fbAPI.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await fbAPI.signInAnonymously(auth);
                                    }

                                    fbAPI.onAuthStateChanged(auth, (currentUser) => {
                                        setUser(currentUser);
                                        if(!currentUser) setIsLoading(false);
                                    });
                                } catch (error) {
                                    console.error("Firebase Init Error:", error);
                                    setFb('ERROR');
                                    setIsLoading(false);
                                }
                            }
                        }, 100);
                    } else {
                        setFb('NO_DB');
                        setIsLoading(false);
                    }
                };
                setupBackend();
            }, []);

            // --- 2. FETCH DATA (ORDERS, STOCK, FINANCE, SETTINGS) ---
            useEffect(() => {
                if (fb === 'NO_DB' || fb === 'ERROR' || !user || !fb) return;

                const todayId = getTodayDocId();

                // Fetch Settings (Session)
                // Firestore document paths must have an even number of segments
                const settingsRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'settings', 'app_config');
                const unsubSettings = fb.onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.lastDate !== todayId) {
                            // Reset to SIANG if it's a new day
                            const newSettings = { lastDate: todayId, currentSession: 'SIANG' };
                            setSessionSettings(newSettings);
                            setActiveSession('SIANG');
                            fb.setDoc(settingsRef, newSettings, { merge: true });
                        } else {
                            setSessionSettings(data);
                            setActiveSession(data.currentSession || 'SIANG');
                        }
                    } else {
                        const newSettings = { lastDate: todayId, currentSession: 'SIANG' };
                        setSessionSettings(newSettings);
                        setActiveSession('SIANG');
                        fb.setDoc(settingsRef, newSettings, { merge: true });
                    }
                });

                // Fetch Orders
                const ordersRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                const unsubOrders = fb.onSnapshot(ordersRef, 
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.timestamp - a.timestamp);
                        setOrders(data);
                        setIsLoading(false);
                    },
                    (error) => { console.error(error); setIsLoading(false); }
                );

                // Fetch Today's Stock
                const stockRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'stock_kedai_titin', todayId);
                const unsubStock = fb.onSnapshot(stockRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setDailyStock(docSnap.data());
                    } else {
                        setDailyStock({});
                    }
                }, (error) => console.error(error));

                // Fetch Today's Finance
                const financeRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin', todayId);
                const unsubFinance = fb.onSnapshot(financeRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setDailyFinance(docSnap.data());
                    } else {
                        setDailyFinance({ uangLaci: 0 });
                    }
                }, (error) => console.error(error));

                return () => { unsubOrders(); unsubStock(); unsubFinance(); unsubSettings(); };
            }, [user, fb]);

            // Auto-focus password input in modal
            useEffect(() => {
                if(showAdminLoginModal && passwordInputRef.current) passwordInputRef.current.focus();
            }, [showAdminLoginModal]);

            // Fokus input harga manual
            useEffect(() => {
                if(manualModal.show) document.getElementById('manualPriceInput')?.focus();
            }, [manualModal.show]);

            // --- COMPUTED DATA ---
            const isAuthorized = activeUser?.role === 'ADMIN' || isTempAdminUnlocked;

            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 3500);
            };

            // Order Stats
            const stats = useMemo(() => {
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

                let dailyTotal = 0; let dailyCount = 0;
                let monthlyTotal = 0; let monthlyCount = 0;
                let overallTotal = 0; let overallCount = orders.length;

                orders.forEach(order => {
                    const ts = order.timestamp;
                    const price = order.price;
                    overallTotal += price;

                    if (ts >= monthStart) {
                        monthlyTotal += price;
                        monthlyCount++;
                        if (ts >= todayStart) {
                            dailyTotal += price;
                            dailyCount++;
                        }
                    }
                });

                return { daily: { total: dailyTotal, count: dailyCount }, monthly: { total: monthlyTotal, count: monthlyCount }, overall: { total: overallTotal, count: overallCount } };
            }, [orders]);

            // Calculated Sold Items Today
            const soldItemsToday = useMemo(() => {
                const counts = {};
                const todayStart = new Date();
                todayStart.setHours(0,0,0,0);
                const todayTime = todayStart.getTime();

                orders.filter(o => o.timestamp >= todayTime).forEach(order => {
                    if (order.items && Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            counts[item.name] = (counts[item.name] || 0) + item.qty;
                        });
                    } else if (order.name) {
                        // Fallback for old data format
                        const parts = order.name.split(', ');
                        parts.forEach(part => {
                            const match = part.match(/(.+) x(\d+)/);
                            if (match) {
                                const name = match[1].trim();
                                const qty = parseInt(match[2]);
                                counts[name] = (counts[name] || 0) + qty;
                            }
                        });
                    }
                });
                return counts;
            }, [orders]);

            // Calculated Finance Today (Per Session)
            const financeStats = useMemo(() => {
                const todayStart = new Date();
                todayStart.setHours(0,0,0,0);
                const todayTime = todayStart.getTime();

                let totalIncomeSiang = 0;
                let totalIncomeMalam = 0;
                let totalQrisSiang = 0;
                let totalQrisMalam = 0;
                let totalCashExpectedSiang = 0;
                let totalCashExpectedMalam = 0;

                orders.filter(o => o.timestamp >= todayTime).forEach(o => {
                    if (o.session === 'SIANG' || !o.session) {
                        totalIncomeSiang += o.price;
                        if (o.isQris) totalQrisSiang += o.price;
                        else totalCashExpectedSiang += o.price;
                    } else if (o.session === 'MALAM') {
                        totalIncomeMalam += o.price;
                        if (o.isQris) totalQrisMalam += o.price;
                        else totalCashExpectedMalam += o.price;
                    }
                });

                const selisihSiang = (dailyFinance.uangLaciSiang || 0) - totalCashExpectedSiang;
                const selisihMalam = (dailyFinance.uangLaciMalam || 0) - totalCashExpectedMalam;

                return { 
                    siang: { totalIncome: totalIncomeSiang, totalQris: totalQrisSiang, totalCashExpected: totalCashExpectedSiang, selisih: selisihSiang },
                    malam: { totalIncome: totalIncomeMalam, totalQris: totalQrisMalam, totalCashExpected: totalCashExpectedMalam, selisih: selisihMalam }
                };
            }, [orders, dailyFinance.uangLaciSiang, dailyFinance.uangLaciMalam]);

            const currentCartTotal = useMemo(() => cart.reduce((sum, item) => sum + (item.price * item.qty), 0), [cart]);


            // --- ACTIONS ---

            const handleAppLogin = (e) => {
                e.preventDefault();
                if (selectedUserForLogin && selectedUserForLogin.pin === loginPin) {
                    setActiveUser(selectedUserForLogin);
                    setLoginPin(""); setLoginError(""); setIsTempAdminUnlocked(false); setSelectedUserForLogin(null);
                    showToast(`Selamat datang, ${selectedUserForLogin.name}!`, "success");
                } else {
                    setLoginError("PIN salah!");
                }
            };

            const handleAppLogout = () => {
                setActiveUser(null); setIsTempAdminUnlocked(false); setCart([]); setActiveTab('POS');
                showToast("Berhasil Logout", "success");
            };

            const switchSession = async () => {
                if (fb === 'NO_DB' || !fb || !user) return;

                const nextSession = activeSession === 'SIANG' ? 'MALAM' : 'SIANG';

                try {
                    const settingsRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'settings', 'app_config');
                    await fb.setDoc(settingsRef, { currentSession: nextSession }, { merge: true });
                    setShowSessionModal(false);
                    showToast(`Berhasil pindah ke Sesi ${nextSession === 'SIANG' ? 'Siang' : 'Malam'}!`, "success");
                } catch (error) {
                    showToast("Gagal memindahkan sesi.", "error");
                }
            };

            // Cart Actions
            const addFixedToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id && i.price === item.price);
                    if (existing) return prev.map(i => i === existing ? {...i, qty: i.qty + 1} : i);
                    return [...prev, { ...item, qty: 1, cartId: Date.now().toString() }];
                });
            };

            const submitManualPrice = (e) => {
                e.preventDefault();
                const price = Number(manualPriceInput);
                if (price <= 0) { showToast("Harga tidak valid", "error"); return; }
                
                setCart(prev => {
                    const existing = prev.find(i => i.id === manualModal.item.id && i.price === price);
                    if (existing) return prev.map(i => i === existing ? {...i, qty: i.qty + 1} : i);
                    return [...prev, { ...manualModal.item, price: price, qty: 1, cartId: Date.now().toString() }];
                });
                
                setManualModal({ show: false, item: null });
                setManualPriceInput("");
            };

            const updateCartQty = (cartId, delta) => {
                setCart(prev => prev.map(i => {
                    if (i.cartId === cartId) {
                        const newQty = i.qty + delta;
                        return newQty > 0 ? { ...i, qty: newQty } : null;
                    }
                    return i;
                }).filter(Boolean));
            };

            const clearCart = () => {
                setCart([]);
            };

            // Checkout
            const handleCheckout = async () => {
                if (cart.length === 0) return;
                if (fb === 'NO_DB' || fb === 'ERROR') { showToast("Gagal: Database tidak terhubung", "error"); return; }
                if (!user || !fb) return;

                const itemsStr = cart.map(i => `${i.name} x${i.qty}`).join(', ');
                
                const newOrder = {
                    name: itemsStr,
                    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
                    price: currentCartTotal,
                    timestamp: Date.now(),
                    kasir: activeUser.name,
                    isQris: isQris,
                    session: activeSession
                };

                try {
                    const collectionRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                    await fb.addDoc(collectionRef, newOrder);
                    setCart([]);
                    setIsQris(false);
                    showToast("Pesanan berhasil disimpan!", "success");
                } catch (error) {
                    console.error(error); showToast("Gagal menyimpan pesanan.", "error");
                }
            };

            // Delete Logic
            const handleDeleteClick = (id) => {
                if (isAuthorized) executeDelete(id);
                else { setPendingDeleteId(id); setAdminPasswordInput(""); setAdminError(""); setShowAdminLoginModal(true); }
            };

            const executeDelete = async (id) => {
                if (!user || !fb || fb === 'NO_DB' || fb === 'ERROR') return;
                try {
                    const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin', id);
                    await fb.deleteDoc(docRef);
                    showToast("Data pesanan dihapus.", "success");
                } catch (error) { showToast("Gagal menghapus data.", "error"); }
            };

            const handleLockedCardClick = () => {
                if (!isAuthorized) {
                    setPendingDeleteId(null);
                    setAdminPasswordInput("");
                    setAdminError("");
                    setShowAdminLoginModal(true);
                }
            };

            // Admin Access
            const handleAdminLogin = () => {
                const adminUser = APP_USERS.find(u => u.role === 'ADMIN');
                if (adminPasswordInput === adminUser.pin) {
                    setIsTempAdminUnlocked(true); setShowAdminLoginModal(false); setAdminPasswordInput(""); setAdminError("");
                    showToast("Akses Admin Terbuka!", "success");
                    if (pendingDeleteId) { executeDelete(pendingDeleteId); setPendingDeleteId(null); }
                } else { setAdminError("PIN Admin Salah!"); }
            };

            const handleLockAdminAccess = () => {
                setIsTempAdminUnlocked(false);
                setPendingDeleteId(null);
                showToast("Akses Admin Dikunci", "success");
            };

            const cancelAdminLogin = () => {
                setShowAdminLoginModal(false);
                setPendingDeleteId(null);
            };

            // Ekspor CSV
            const exportToCSV = () => {
                if (orders.length === 0) {
                    showToast("Belum ada data untuk diekspor.", "error");
                    return;
                }

                const csvRows = [];
                csvRows.push(["Tanggal", "Waktu", "Rincian Pesanan", "Sesi", "Kasir", "Total Harga (Rp)"].join(','));
                
                orders.forEach(order => {
                    const dateObj = new Date(order.timestamp);
                    const dateStr = dateObj.toLocaleDateString('id-ID');
                    const timeStr = dateObj.toLocaleTimeString('id-ID');
                    const safeName = `"${order.name.replace(/"/g, '""')}"`;
                    const sessionName = order.session || "SIANG";
                    const kasirName = order.kasir ? `"${order.kasir}"` : "Tidak Diketahui";
                    csvRows.push([dateStr, timeStr, safeName, sessionName, kasirName, order.price].join(','));
                });

                const csvContent = csvRows.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Laporan_Kedai_Bu_Titin_${new Date().toLocaleDateString('id-ID')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showToast("Laporan berhasil diunduh!", "success");
            };

            // Stock & Finance Updates
            const handleUpdateStock = (itemName, field, value) => {
                const val = Number(value) || 0;
                setDailyStock(prev => ({
                    ...prev,
                    [itemName]: { ...(prev[itemName] || {awal: 0, tambah: 0, fisik: 0}), [field]: val }
                }));
            };

            const saveStockToDb = async () => {
                if (!user || !fb || fb === 'NO_DB') return;
                try {
                    const stockRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'stock_kedai_titin', getTodayDocId());
                    await fb.setDoc(stockRef, dailyStock, { merge: true });
                    showToast("Data Stok Disimpan", "success");
                } catch (error) { showToast("Gagal menyimpan stok", "error"); }
            };

            const saveFinanceToDb = async (sessionType) => {
                if (!user || !fb || fb === 'NO_DB') return;
                try {
                    const financeRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin', getTodayDocId());
                    
                    const updateData = sessionType === 'SIANG' 
                        ? { uangLaciSiang: dailyFinance.uangLaciSiang } 
                        : { uangLaciMalam: dailyFinance.uangLaciMalam };

                    await fb.setDoc(financeRef, updateData, { merge: true });
                    showToast("Data Keuangan Disimpan", "success");
                } catch (error) { showToast("Gagal menyimpan keuangan", "error"); }
            };


            // --- RENDERERS ---

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50">
                        <div className="flex flex-col items-center gap-3">
                            <Icon name="loader-2" className="w-10 h-10 text-orange-500 animate-spin" />
                            <div className="text-xl font-bold text-orange-700 animate-pulse">Menyiapkan Dapur...</div>
                        </div>
                    </div>
                );
            }

            // LOGIN SCREEN
            if (!activeUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50 px-4 font-sans">

                                                    return (
                                                        <tr key={item.id} className="hover:bg-gray-50">
                                                            <td className="p-4 font-bold text-gray-800 flex items-center gap-2">
                                                                <Icon name={item.icon} className="w-4 h-4 text-gray-400"/> {item.name}
                                                            </td>
                                                            <td className="p-3">
                                                                <input type="number" min="0" value={s.awal || ''} onChange={(e)=>handleUpdateStock(item.name, 'awal', e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-center focus:ring-2 focus:ring-orange-400 outline-none" placeholder="0"/>
                                                            </td>
                                                            <td className="p-3">
                                                                <input type="number" min="0" value={s.tambah || ''} onChange={(e)=>handleUpdateStock(item.name, 'tambah', e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-center focus:ring-2 focus:ring-orange-400 outline-none" placeholder="0"/>
                                                            </td>
                                                            <td className="p-4 text-center font-bold text-red-500 bg-red-50/30">{terjual}</td>
                                                            <td className="p-4 text-center font-bold text-blue-600 bg-blue-50/30">{sisaSistem}</td>
                                                            <td className="p-3">
                                                                <input type="number" min="0" value={s.fisik || ''} onChange={(e)=>handleUpdateStock(item.name, 'fisik', e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-center focus:ring-2 focus:ring-orange-400 outline-none font-bold" placeholder="0"/>
                                                            </td>
                                                            <td className="p-4 text-center font-bold">
                                                                <span className={`px-2 py-1 rounded ${selisih === 0 ? 'text-green-600 bg-green-100' : selisih < 0 ? 'text-red-600 bg-red-100' : 'text-blue-600 bg-blue-100'}`}>
                                                                    {selisih > 0 ? `+${selisih}` : selisih}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="p-4 bg-yellow-50 text-xs text-yellow-800 border-t border-yellow-200 flex items-start gap-2">
                                        <Icon name="info" className="w-4 h-4 flex-shrink-0" />
                                        <p><b>Catatan:</b> 'Terjual' dihitung otomatis dari pesanan hari ini. 'Sisa Sistem' = (Stok Awal + Penambahan) - Terjual. Selisih negatif berarti ada barang hilang/tidak terinput. Tekan "Simpan Data" setelah mengubah angka.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= TAB KEUANGAN (DIBAGI 2 SESI) ================= */}
                        {activeTab === 'KEUANGAN' && (
                            <div className="fade-in max-w-5xl mx-auto space-y-6">
                                {/* SESI SIANG */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-gradient-to-r from-yellow-500 to-orange-400 p-4 sm:p-6 text-white flex justify-between items-center">
                                        <div>
                                            <h2 className="text-xl sm:text-2xl font-bold flex items-center gap-2"><Icon name="sun" /> Keuangan: Sesi Siang</h2>
                                            <p className="text-yellow-100 text-xs sm:text-sm mt-1">{new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                        </div>
                                    </div>

                                    <div className="p-4 sm:p-6 space-y-6">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                                <p className="text-sm text-gray-500 font-semibold mb-1">Total Pendapatan Sistem</p>
                                                <h3 className="text-2xl font-black text-gray-800">{formatRupiah(financeStats.siang.totalIncome)}</h3>
                                            </div>
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                                                <p className="text-sm text-blue-600 font-semibold mb-1 flex items-center gap-1"><Icon name="qr-code" className="w-4 h-4"/> Pembayaran QRIS</p>
                                                <h3 className="text-2xl font-black text-blue-800">{formatRupiah(financeStats.siang.totalQris)}</h3>
                                            </div>
                                        </div>

                                        <div className="bg-orange-50 p-5 rounded-xl border border-orange-200 text-center">
                                            <p className="text-sm text-orange-700 font-bold mb-1">Ekspektasi Uang Tunai (Total - QRIS)</p>
                                            <h3 className="text-4xl font-black text-orange-800">{formatRupiah(financeStats.siang.totalCashExpected)}</h3>
                                        </div>

                                        <div className="border-t border-gray-200 pt-6">
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Hitung Fisik Uang di Laci (Sesi Siang)</label>
                                            <div className="flex gap-4 items-center">
                                                <input 
                                                    type="number" 
                                                    value={dailyFinance.uangLaciSiang || ''}
                                                    onChange={(e) => setDailyFinance(prev => ({...prev, uangLaciSiang: Number(e.target.value)}))}
                                                    className="flex-1 p-4 text-2xl font-bold text-gray-800 bg-white border-2 border-gray-300 rounded-xl focus:ring-0 focus:border-orange-500 outline-none transition"
                                                    placeholder="0"
                                                />
                                                <button onClick={() => saveFinanceToDb('SIANG')} className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-6 rounded-xl transition flex items-center gap-2">
                                                    <Icon name="save" /> Simpan
                                                </button>
                                            </div>
                                        </div>

                                        <div className={`p-5 rounded-xl flex items-center justify-between border ${financeStats.siang.selisih === 0 ? 'bg-green-50 border-green-200' : financeStats.siang.selisih < 0 ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-200'}`}>
                                            <div>
                                                <p className={`text-sm font-bold ${financeStats.siang.selisih === 0 ? 'text-green-700' : financeStats.siang.selisih < 0 ? 'text-red-700' : 'text-blue-700'}`}>Status Selisih (Siang)</p>
                                                <p className="text-xs text-gray-500">Uang Laci dikurangi Ekspektasi Tunai</p>
                                            </div>
                                            <h3 className={`text-2xl font-black ${financeStats.siang.selisih === 0 ? 'text-green-700' : financeStats.siang.selisih < 0 ? 'text-red-700' : 'text-blue-700'}`}>
                                                {financeStats.siang.selisih > 0 ? '+' : ''}{formatRupiah(financeStats.siang.selisih)}
                                            </h3>
                                        </div>
                                    </div>
                                </div>

                                {/* SESI MALAM */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-gradient-to-r from-indigo-700 to-purple-600 p-4 sm:p-6 text-white flex justify-between items-center">
                                        <div>
                                            <h2 className="text-xl sm:text-2xl font-bold flex items-center gap-2"><Icon name="moon" /> Keuangan: Sesi Malam</h2>
                                            <p className="text-indigo-200 text-xs sm:text-sm mt-1">{new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                        </div>
                                    </div>

                                    <div className="p-4 sm:p-6 space-y-6">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                                <p className="text-sm text-gray-500 font-semibold mb-1">Total Pendapatan Sistem</p>
                                                <h3 className="text-2xl font-black text-gray-800">{formatRupiah(financeStats.malam.totalIncome)}</h3>
                                            </div>
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                                                <p className="text-sm text-blue-600 font-semibold mb-1 flex items-center gap-1"><Icon name="qr-code" className="w-4 h-4"/> Pembayaran QRIS</p>
                                                <h3 className="text-2xl font-black text-blue-800">{formatRupiah(financeStats.malam.totalQris)}</h3>
                                            </div>
                                        </div>

                                        <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-200 text-center">
                                            <p className="text-sm text-indigo-700 font-bold mb-1">Ekspektasi Uang Tunai (Total - QRIS)</p>
                                            <h3 className="text-4xl font-black text-indigo-800">{formatRupiah(financeStats.malam.totalCashExpected)}</h3>
                                        </div>

                                        <div className="border-t border-gray-200 pt-6">
                                            <label className="block text-sm font-bold text-gray-700 mb-2">Hitung Fisik Uang di Laci (Sesi Malam)</label>
                                            <div className="flex gap-4 items-center">
                                                <input 
                                                    type="number" 
                                                    value={dailyFinance.uangLaciMalam || ''}
                                                    onChange={(e) => setDailyFinance(prev => ({...prev, uangLaciMalam: Number(e.target.value)}))}
                                                    className="flex-1 p-4 text-2xl font-bold text-gray-800 bg-white border-2 border-gray-300 rounded-xl focus:ring-0 focus:border-indigo-500 outline-none transition"
                                                    placeholder="0"
                                                />
                                                <button onClick={() => saveFinanceToDb('MALAM')} className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-6 rounded-xl transition flex items-center gap-2">
                                                    <Icon name="save" /> Simpan
                                                </button>
                                            </div>
                                        </div>

                                        <div className={`p-5 rounded-xl flex items-center justify-between border ${financeStats.malam.selisih === 0 ? 'bg-green-50 border-green-200' : financeStats.malam.selisih < 0 ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-200'}`}>
                                            <div>
                                                <p className={`text-sm font-bold ${financeStats.malam.selisih === 0 ? 'text-green-700' : financeStats.malam.selisih < 0 ? 'text-red-700' : 'text-blue-700'}`}>Status Selisih (Malam)</p>
                                                <p className="text-xs text-gray-500">Uang Laci dikurangi Ekspektasi Tunai</p>
                                            </div>
                                            <h3 className={`text-2xl font-black ${financeStats.malam.selisih === 0 ? 'text-green-700' : financeStats.malam.selisih < 0 ? 'text-red-700' : 'text-blue-700'}`}>
                                                {financeStats.malam.selisih > 0 ? '+' : ''}{formatRupiah(financeStats.malam.selisih)}
                                            </h3>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL PINDAH SESI */}
                    {showSessionModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${activeSession === 'SIANG' ? 'bg-indigo-100 text-indigo-600' : 'bg-yellow-100 text-yellow-600'}`}>
                                    <Icon name={activeSession === 'SIANG' ? 'moon' : 'sun'} className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">
                                    Pindah ke Sesi {activeSession === 'SIANG' ? 'Malam' : 'Siang'}?
                                </h3>
                                <p className="text-sm text-gray-500 mb-6">
                                    Semua pesanan selanjutnya akan tercatat pada Sesi {activeSession === 'SIANG' ? 'Malam' : 'Siang'}.
                                </p>
                                
                                <div className="flex gap-3">
                                    <button onClick={() => setShowSessionModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Batal</button>
                                    <button onClick={switchSession} className={`flex-1 text-white font-bold py-3 rounded-xl shadow-md transition ${activeSession === 'SIANG' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-yellow-500 hover:bg-yellow-600'}`}>
                                        Ya, Pindah Sesi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL INPUT MANUAL PRICE */}
                    {manualModal.show && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <form onSubmit={submitManualPrice} className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-transform">
                                <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name={manualModal.item.icon} className="w-7 h-7" />
                                </div>
                                <h3 className="text-2xl font-bold text-gray-800 text-center mb-1">{manualModal.item.name}</h3>
                                <p className="text-sm text-gray-500 text-center mb-6">Masukkan nominal harga untuk pesanan ini</p>
                                
                                <div className="relative mb-6">
                                    <span className="absolute left-4 top-1/2 transform -translate-y-1/2 font-bold text-gray-500">Rp</span>
                                    <input 
                                        id="manualPriceInput"
                                        type="number" 
                                        value={manualPriceInput}
                                        onChange={(e) => setManualPriceInput(e.target.value)}
                                        placeholder="0"
                                        className="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:ring-0 focus:border-blue-500 outline-none transition text-2xl font-black text-gray-800"
                                    />
                                </div>

                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setManualModal({show: false, item: null})} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 rounded-xl transition">Batal</button>
                                    <button type="submit" className="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition">Tambahkan</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL LOGIN ADMIN UNTUK MEMBUKA FITUR TERKUNCI */}
                    {showAdminLoginModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <div className="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="shield-check" className="text-orange-600 w-7 h-7" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 text-center mb-2">Otorisasi Admin</h3>
                                <p className="text-sm text-gray-500 text-center mb-6">Minta Admin memasukkan PIN untuk membuka akses ini.</p>
                                
                                <div className="relative mb-2">
                                    <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"><Icon name="key" className="w-5 h-5" /></div>
                                    <input 
                                        type="password" ref={passwordInputRef} value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)}
                                        placeholder="PIN Admin..." className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-orange-500 outline-none text-center tracking-widest text-lg font-bold"
                                        onKeyDown={(e) => { if(e.key === 'Enter') handleAdminLogin(); }}
                                    />
                                </div>
                                {adminError && <p className="text-sm text-red-500 mb-4 font-semibold text-center animate-pulse">{adminError}</p>}

                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setShowAdminLoginModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Batal</button>
                                    <button onClick={handleAdminLogin} className="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-md">Buka Akses</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* TOAST SYSTEM */}
                    {toast.show && (
                        <div className={`fixed bottom-6 right-6 flex items-center gap-3 text-white px-6 py-4 rounded-xl shadow-2xl animate-bounce z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            <Icon name={toast.type === 'error' ? 'alert-triangle' : 'check-circle'} className="w-6 h-6" />
                            <span className="font-bold">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
