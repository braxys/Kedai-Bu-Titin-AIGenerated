<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Bu Titin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbf7; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Script Module Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Mengekspos Firebase ke window agar bisa dibaca dengan aman oleh React
        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DELETE_PASSWORD = "butitin123";

        // Daftar Akun Pengguna (Bisa diganti nama & PIN-nya nanti)
        const APP_USERS = [
            { name: 'Admin', role: 'ADMIN', pin: 'butitin123' },
            { name: 'Siti', role: 'KASIR', pin: '1111' },
            { name: 'Budi', role: 'KASIR', pin: '2222' }
        ];

        // 🔴 PENTING UNTUK VERCEL: Masukkan konfigurasi Firebase Anda di bawah ini
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDeAxdaokFnPsqDUAEBWBjjTjCTSXYk8U8",
            authDomain: "kedai-bu-titin.firebaseapp.com",
            projectId: "kedai-bu-titin",
            storageBucket: "kedai-bu-titin.firebasestorage.app",
            messagingSenderId: "735859710275",
            appId: "1:735859710275:web:4adca4554734f4f36cb7f6",
            measurementId: "G-0MN2Q7XH5Y"
        };

        // Komponen Icon yang aman untuk React
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Bersihkan ikon lama jika ada
                    iconRef.current.innerHTML = '';
                    
                    // Buat elemen <i> baru untuk diubah oleh Lucide
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            // Firebase State
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Form State
            const [itemName, setItemName] = useState("");
            const [itemPrice, setItemPrice] = useState("");

            // Global & Modal State
            const [activeUser, setActiveUser] = useState(null); // Menyimpan data user yang sedang login
            const [selectedUserForLogin, setSelectedUserForLogin] = useState(null); // User yang dipilih di layar login
            const [isTempAdminUnlocked, setIsTempAdminUnlocked] = useState(false); // Untuk kasir yang buka akses admin
            const [loginPin, setLoginPin] = useState("");
            const [loginError, setLoginError] = useState("");
            
            // Pending Action State (menyimpan aksi yang tertunda karena butuh login admin)
            const [pendingDeleteId, setPendingDeleteId] = useState(null);
            
            // Admin Login Modal State
            const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState("");
            const [adminError, setAdminError] = useState("");
            const passwordInputRef = useRef(null);

            // Toast Notifications
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            // 1. Initialize Firebase & Auth
            useEffect(() => {
                const setupBackend = () => {
                    let configToUse = null;
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        configToUse = JSON.parse(__firebase_config); // Canvas env
                    } else if (MY_FIREBASE_CONFIG.apiKey) {
                        configToUse = MY_FIREBASE_CONFIG; // Vercel env
                    }

                    if (configToUse) {
                        const checkFirebase = setInterval(async () => {
                            if (window.FirebaseAPI) {
                                clearInterval(checkFirebase);
                                try {
                                    const fbAPI = window.FirebaseAPI;
                                    const app = fbAPI.initializeApp(configToUse);
                                    const auth = fbAPI.getAuth(app);
                                    const db = fbAPI.getFirestore(app);
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'kedai-bu-titin-pos';
                                    
                                    setFb({ 
                                        db, appId, 
                                        collection: fbAPI.collection, 
                                        onSnapshot: fbAPI.onSnapshot, 
                                        addDoc: fbAPI.addDoc, 
                                        deleteDoc: fbAPI.deleteDoc, 
                                        doc: fbAPI.doc 
                                    });

                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await fbAPI.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await fbAPI.signInAnonymously(auth);
                                    }

                                    fbAPI.onAuthStateChanged(auth, (currentUser) => {
                                        setUser(currentUser);
                                        if(!currentUser) setIsLoading(false);
                                    });
                                } catch (error) {
                                    console.error("Firebase Init Error:", error);
                                    if (error.code === 'auth/operation-not-allowed') {
                                        showToast("GAGAL: Fitur 'Anonymous' Login belum aktif di Firebase!", "error");
                                    } else {
                                        showToast("Gagal terhubung ke database.", "error");
                                    }
                                    setFb('ERROR');
                                    setIsLoading(false);
                                }
                            }
                        }, 100);
                    } else {
                        console.log("No Firebase Config detected.");
                        setFb('NO_DB');
                        setIsLoading(false);
                    }
                };
                setupBackend();
            }, []);

            // 2. Fetch Data (Realtime listeners)
            useEffect(() => {
                if (fb === 'NO_DB' || fb === 'ERROR') return; 
                if (!user || !fb) return;

                // Path public data
                const collectionRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                
                const unsubscribe = fb.onSnapshot(collectionRef, 
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => {
                            data.push({ id: doc.id, ...doc.data() });
                        });
                        
                        data.sort((a, b) => b.timestamp - a.timestamp);
                        setOrders(data);
                        setIsLoading(false);
                    },
                    (error) => {
                        console.error("Firestore Listen Error:", error);
                        showToast("Koneksi data terputus.", "error");
                        setIsLoading(false);
                    }
                );

                return () => unsubscribe();
            }, [user, fb]);

            // Fokus ke input password saat modal admin terbuka
            useEffect(() => {
                if(showAdminLoginModal && passwordInputRef.current) {
                    passwordInputRef.current.focus();
                }
            }, [showAdminLoginModal]);

            // Status Otorisasi (Apakah Admin atau Kasir yang sudah buka akses admin)
            const isAuthorized = activeUser?.role === 'ADMIN' || isTempAdminUnlocked;

            // --- Handlers & Actions ---

            const handleAppLogin = (e) => {
                e.preventDefault();
                if (selectedUserForLogin && selectedUserForLogin.pin === loginPin) {
                    setActiveUser(selectedUserForLogin);
                    setLoginPin("");
                    setLoginError("");
                    setIsTempAdminUnlocked(false);
                    setSelectedUserForLogin(null); // Reset form login
                    showToast(`Selamat datang, ${selectedUserForLogin.name}!`, "success");
                } else {
                    setLoginError("PIN salah!");
                }
            };

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 3500);
            };

            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            // Tambah Pesanan
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!itemName.trim() || !itemPrice) {
                    showToast("Nama pesanan dan harga wajib diisi!", "error");
                    return;
                }

                const newOrder = {
                    name: itemName.trim(),
                    price: Number(itemPrice),
                    timestamp: Date.now(),
                    kasir: activeUser.name
                };

                if (fb === 'NO_DB' || fb === 'ERROR') {
                    showToast("Tidak terhubung ke database. Gagal menyimpan.", "error");
                    return;
                }

                if (!user || !fb) return;

                try {
                    const collectionRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                    await fb.addDoc(collectionRef, newOrder);
                    
                    setItemName("");
                    setItemPrice("");
                    showToast("Pesanan ditambahkan!", "success");
                    document.getElementById('itemNameInput').focus();
                } catch (error) {
                    console.error("Add Error:", error);
                    showToast("Gagal menyimpan pesanan.", "error");
                }
            };

            // Menangani klik tombol hapus
            const handleDeleteClick = (id) => {
                if (isAuthorized) {
                    executeDelete(id);
                } else {
                    // Jika belum login, simpan ID yang mau dihapus dan buka modal login admin
                    setPendingDeleteId(id);
                    setAdminPasswordInput("");
                    setAdminError("");
                    setShowAdminLoginModal(true);
                }
            };

            // Menangani klik kartu statistik yang terkunci
            const handleLockedCardClick = () => {
                if (!isAuthorized) {
                    setPendingDeleteId(null); // Kosongkan action delete agar tidak salah eksekusi
                    setAdminPasswordInput("");
                    setAdminError("");
                    setShowAdminLoginModal(true);
                }
            };

            const executeDelete = async (id) => {
                if (!user || !fb || fb === 'NO_DB' || fb === 'ERROR') return;
                try {
                    const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin', id);
                    await fb.deleteDoc(docRef);
                    showToast("Data pesanan dihapus.", "success");
                } catch (error) {
                    console.error("Delete Error:", error);
                    showToast("Gagal menghapus data.", "error");
                }
            };

            // Login / Logout Akses Admin Sementara (Untuk Kasir)
            const handleAdminLogin = () => {
                const adminUser = APP_USERS.find(u => u.role === 'ADMIN');
                if (adminPasswordInput === adminUser.pin) {
                    setIsTempAdminUnlocked(true);
                    setShowAdminLoginModal(false);
                    setAdminPasswordInput("");
                    setAdminError("");
                    showToast("Akses Admin Terbuka!", "success");
                    
                    // Jika login berasal dari klik tombol hapus, langsung eksekusi hapus
                    if (pendingDeleteId) {
                        executeDelete(pendingDeleteId);
                        setPendingDeleteId(null); // Reset setelah dieksekusi
                    }
                } else {
                    setAdminError("PIN Admin Salah!");
                }
            };

            const handleLockAdminAccess = () => {
                setIsTempAdminUnlocked(false);
                setPendingDeleteId(null);
                showToast("Akses Admin Dikunci", "success");
            };
            
            const handleAppLogout = () => {
                setActiveUser(null);
                setIsTempAdminUnlocked(false);
                showToast("Berhasil Logout", "success");
            };

            const cancelAdminLogin = () => {
                setShowAdminLoginModal(false);
                setPendingDeleteId(null);
            };

            // Ekspor CSV
            const exportToCSV = () => {
                if (orders.length === 0) {
                    showToast("Belum ada data untuk diekspor.", "error");
                    return;
                }

                const csvRows = [];
                csvRows.push(["Tanggal", "Waktu", "Nama Pesanan", "Kasir", "Harga (Rp)"].join(','));
                
                orders.forEach(order => {
                    const dateObj = new Date(order.timestamp);
                    const dateStr = dateObj.toLocaleDateString('id-ID');
                    const timeStr = dateObj.toLocaleTimeString('id-ID');
                    const safeName = `"${order.name.replace(/"/g, '""')}"`;
                    const kasirName = order.kasir ? `"${order.kasir}"` : "Tidak Diketahui";
                    csvRows.push([dateStr, timeStr, safeName, kasirName, order.price].join(','));
                });

                const csvContent = csvRows.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Laporan_Kedai_Bu_Titin_${new Date().toLocaleDateString('id-ID')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showToast("Laporan berhasil diunduh!", "success");
            };

            // Kalkulasi Statistik
            const stats = useMemo(() => {
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

                let dailyTotal = 0; let dailyCount = 0;
                let monthlyTotal = 0; let monthlyCount = 0;
                let overallTotal = 0; let overallCount = orders.length;

                orders.forEach(order => {
                    const ts = order.timestamp;
                    const price = order.price;
                    overallTotal += price;

                    if (ts >= monthStart) {
                        monthlyTotal += price;
                        monthlyCount++;
                        if (ts >= todayStart) {
                            dailyTotal += price;
                            dailyCount++;
                        }
                    }
                });

                return {
                    daily: { total: dailyTotal, count: dailyCount },
                    monthly: { total: monthlyTotal, count: monthlyCount },
                    overall: { total: overallTotal, count: overallCount }
                };
            }, [orders]);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50">
                        <div className="flex flex-col items-center gap-3">
                            <Icon name="loader-2" className="w-10 h-10 text-orange-500 animate-spin" />
                            <div className="text-xl font-bold text-orange-700 animate-pulse">Menyiapkan Dapur...</div>
                        </div>
                    </div>
                );
            }

            // --- LAYAR LOGIN UTAMA ---
            if (!activeUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50 px-4 font-sans">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full fade-in border-t-4 border-orange-500">
                            <div className="flex justify-center mb-6">
                                <div className="bg-gradient-to-r from-red-600 to-orange-500 text-white p-4 rounded-full shadow-lg">
                                    <Icon name="utensils-crossed" className="w-10 h-10" />
                                </div>
                            </div>
                            <h2 className="text-2xl font-extrabold text-center text-gray-800 mb-2">Kedai Bu Titin</h2>
                            <p className="text-center text-sm text-gray-500 mb-8">Sistem Kasir Pintar. Silakan masuk.</p>

                            {!selectedUserForLogin ? (
                                <div className="space-y-3 fade-in">
                                    <p className="text-center text-gray-600 font-semibold mb-4">Pilih Akun Anda:</p>
                                    <div className="grid grid-cols-1 gap-3">
                                        {APP_USERS.map((u, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => { setSelectedUserForLogin(u); setLoginError(""); setLoginPin(""); }}
                                                className={`flex items-center gap-3 w-full p-4 rounded-xl border-2 transition-all hover:shadow-md ${u.role === 'ADMIN' ? 'border-red-200 hover:border-red-500 bg-red-50 text-red-700' : 'border-orange-200 hover:border-orange-500 bg-orange-50 text-orange-700'}`}
                                            >
                                                <Icon name={u.role === 'ADMIN' ? "shield-check" : "user"} className="w-6 h-6" />
                                                <span className="font-bold text-lg">{u.name}</span>
                                                <span className="ml-auto text-xs font-bold px-2 py-1 rounded bg-white/60">{u.role}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <form onSubmit={handleAppLogin} className="fade-in">
                                    <div className="flex items-center gap-3 mb-6 bg-gray-50 p-3 rounded-xl border border-gray-200">
                                        <div className={`p-2 rounded-full ${selectedUserForLogin.role === 'ADMIN' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                            <Icon name={selectedUserForLogin.role === 'ADMIN' ? "shield-check" : "user"} className="w-5 h-5" />
                                        </div>
                                        <div className="text-left">
                                            <p className="text-xs text-gray-500 font-semibold">Login sebagai:</p>
                                            <p className="font-bold text-gray-800">{selectedUserForLogin.name}</p>
                                        </div>
                                    </div>

                                    <div className="relative mb-4">
                                        <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                                            <Icon name="lock-keyhole" className="w-5 h-5" />
                                        </div>
                                        <input 
                                            type="password" 
                                            value={loginPin}
                                            onChange={(e) => setLoginPin(e.target.value)}
                                            placeholder="Masukkan PIN..."
                                            className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition text-center tracking-widest text-lg font-bold"
                                            autoFocus
                                        />
                                    </div>
                                    {loginError && <p className="text-red-500 text-sm font-semibold mt-2 mb-4 text-center animate-pulse">{loginError}</p>}
                                    
                                    <div className="flex gap-3 mt-6">
                                        <button 
                                            type="button"
                                            onClick={() => { setSelectedUserForLogin(null); setLoginError(""); setLoginPin(""); }}
                                            className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition"
                                        >
                                            Kembali
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="flex-[2] bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition duration-200"
                                        >
                                            Masuk
                                        </button>
                                    </div>
                                </form>
                            )}
                            
                            {/* NOTIFIKASI TOAST UNTUK LOGIN SCREEN */}
                            {toast.show && (
                                <div className={`fixed bottom-6 right-6 flex items-center gap-3 text-white px-6 py-4 rounded-xl shadow-2xl animate-bounce z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                                    <Icon name={toast.type === 'error' ? 'alert-triangle' : 'check-circle'} className="w-6 h-6" />
                                    <span className="font-bold">{toast.message}</span>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- LAYAR APLIKASI UTAMA ---
            return (
                <div className="min-h-screen bg-yellow-50 font-sans text-gray-800 pb-12">
                    {/* NAVBAR */}
                    <nav className="bg-gradient-to-r from-red-600 via-orange-500 to-yellow-500 text-white shadow-lg py-4 px-4 sm:px-6 md:px-8 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-white text-red-600 p-2 rounded-full shadow-md flex items-center justify-center">
                                    <Icon name="utensils-crossed" className="w-6 h-6 sm:w-7 sm:h-7" />
                                </div>
                                <div>
                                    <h1 className="text-xl sm:text-2xl md:text-3xl font-extrabold tracking-tight">Kedai Bu Titin</h1>
                                    <p className="text-yellow-100 text-xs sm:text-sm opacity-90 font-medium">Sistem Kasir Pintar</p>
                                </div>
                            </div>
                            
                            {/* Panel Kanan Navbar */}
                            <div className="flex items-center gap-2 sm:gap-3">
                                <div className="hidden md:flex items-center gap-2 text-sm bg-black/10 px-3 py-1.5 rounded-full backdrop-blur-sm mr-2">
                                    <Icon name="user" className="w-4 h-4" />
                                    <span className="font-semibold">{activeUser.name}</span>
                                    <span className="text-yellow-200 text-xs px-1.5 py-0.5 bg-black/20 rounded-md">{activeUser.role}</span>
                                </div>
                                
                                {activeUser.role === 'KASIR' && isTempAdminUnlocked && (
                                    <button 
                                        onClick={handleLockAdminAccess}
                                        className="bg-white/20 hover:bg-white/30 border border-white/40 text-white text-sm font-semibold py-1.5 px-3 sm:px-4 rounded-full transition flex items-center gap-2 backdrop-blur-sm"
                                        title="Kunci Akses Admin"
                                    >
                                        <Icon name="lock" className="w-4 h-4" />
                                        <span className="hidden sm:inline">Kunci Akses</span>
                                    </button>
                                )}

                                <button 
                                    onClick={handleAppLogout}
                                    className="bg-white text-red-600 hover:bg-red-50 text-sm font-bold py-1.5 px-3 sm:px-4 rounded-full shadow-md transition flex items-center gap-2"
                                    title="Keluar / Ganti Akun"
                                >
                                    <Icon name="log-out" className="w-4 h-4" />
                                    <span className="hidden sm:inline">Logout</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 md:px-8 mt-6">
                        
                        {/* KARTU STATISTIK */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            {/* Hari Ini - Selalu Terbuka */}
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-orange-100 flex items-center gap-4 hover:shadow-md transition-shadow fade-in">
                                <div className="bg-orange-100 p-4 rounded-xl text-orange-600">
                                    <Icon name="sun" className="w-8 h-8" />
                                </div>
                                <div>
                                    <p className="text-sm font-semibold text-gray-500 uppercase tracking-wider">Hari Ini</p>
                                    <h3 className="text-2xl font-bold text-gray-800">{formatRupiah(stats.daily.total)}</h3>
                                    <p className="text-xs font-medium text-orange-600 bg-orange-50 inline-block px-2 py-0.5 rounded-md mt-1">{stats.daily.count} Pesanan</p>
                                </div>
                            </div>

                            {/* Bulan Ini */}
                            <div 
                                onClick={handleLockedCardClick}
                                className={`bg-white p-5 rounded-2xl shadow-sm border border-red-100 flex items-center gap-4 transition-all fade-in ${!isAuthorized ? 'cursor-pointer hover:bg-red-50 hover:shadow-md' : 'hover:shadow-md'}`} style={{animationDelay: '0.1s'}}>
                                <div className={`p-4 rounded-xl ${isAuthorized ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-500'}`}>
                                    <Icon name="calendar-days" className="w-8 h-8" />
                                </div>
                                <div className="flex-1">
                                    <p className="text-sm font-semibold text-gray-500 uppercase tracking-wider">Bulan Ini</p>
                                    {isAuthorized ? (
                                        <>
                                            <h3 className="text-2xl font-bold text-gray-800">{formatRupiah(stats.monthly.total)}</h3>
                                            <p className="text-xs font-medium text-red-600 bg-red-50 inline-block px-2 py-0.5 rounded-md mt-1">{stats.monthly.count} Pesanan</p>
                                        </>
                                    ) : (
                                        <p className="text-sm font-medium text-gray-400 mt-1 italic flex items-center gap-1">
                                            <Icon name="lock" className="w-3 h-3" />
                                            <span>Ketuk untuk akses admin</span>
                                        </p>
                                    )}
                                </div>
                            </div>

                            {/* Keseluruhan */}
                            <div 
                                onClick={handleLockedCardClick}
                                className={`p-5 rounded-2xl shadow-md flex items-center gap-4 transition-all fade-in ${!isAuthorized ? 'bg-white border border-gray-200 cursor-pointer hover:bg-gray-50 text-gray-800' : 'bg-gradient-to-br from-yellow-400 to-orange-500 text-white hover:shadow-lg'}`} style={{animationDelay: '0.2s'}}>
                                <div className={`p-4 rounded-xl ${isAuthorized ? 'bg-white/20 backdrop-blur-sm' : 'bg-gray-100 text-gray-500'}`}>
                                    <Icon name="wallet" className="w-8 h-8" />
                                </div>
                                <div className="flex-1">
                                    <p className={`text-sm font-semibold uppercase tracking-wider ${isAuthorized ? 'text-yellow-100' : 'text-gray-500'}`}>Total Keseluruhan</p>
                                    {isAuthorized ? (
                                        <>
                                            <h3 className="text-2xl font-bold">{formatRupiah(stats.overall.total)}</h3>
                                            <p className="text-xs font-medium bg-black/20 inline-block px-2 py-0.5 rounded-md mt-1">{stats.overall.count} Total Pesanan</p>
                                        </>
                                    ) : (
                                        <p className="text-sm font-medium text-gray-400 mt-1 italic flex items-center gap-1">
                                            <Icon name="lock" className="w-3 h-3" />
                                            <span>Ketuk untuk akses admin</span>
                                        </p>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-6">
                            
                            {/* BAGIAN KIRI: Form Input */}
                            <div className="w-full lg:w-1/3">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-28">
                                    <h2 className="text-xl font-bold mb-5 flex items-center gap-2 text-gray-800 border-b pb-3">
                                        <div className="bg-orange-100 p-1.5 rounded-lg text-orange-600">
                                            <Icon name="plus" className="w-5 h-5" />
                                        </div>
                                        Input Pesanan Baru
                                    </h2>
                                    
                                    <form onSubmit={handleSubmit} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Nama Pesanan</label>
                                            <input 
                                                id="itemNameInput"
                                                type="text" 
                                                value={itemName}
                                                onChange={(e) => setItemName(e.target.value)}
                                                placeholder="Cth: Nasi Goreng + Es Teh"
                                                className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition duration-200"
                                            />
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Harga Total (Rp)</label>
                                            <input 
                                                type="number" 
                                                value={itemPrice}
                                                onChange={(e) => setItemPrice(e.target.value)}
                                                placeholder="Cth: 25000"
                                                className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition duration-200 font-mono"
                                            />
                                        </div>

                                        <button 
                                            type="submit" 
                                            disabled={fb === 'ERROR'}
                                            className={`w-full font-bold py-3.5 rounded-xl shadow-md transition duration-200 flex justify-center items-center gap-2 text-lg
                                            ${fb === 'ERROR' ? 'bg-gray-400 cursor-not-allowed text-gray-200' : 'bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white hover:shadow-lg'}`}
                                        >
                                            <Icon name="save" className="w-5 h-5" />
                                            Simpan Pesanan
                                        </button>
                                    </form>
                                    
                                    {fb === 'ERROR' && (
                                        <div className="mt-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg flex gap-2">
                                            <Icon name="wifi-off" className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                            <span>Sistem gagal terhubung ke database. Cek pengaturan Firebase Anda.</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* BAGIAN KANAN: Tabel Data */}
                            <div className="w-full lg:w-2/3">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full">
                                    <div className="p-5 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-gray-50/50 rounded-t-2xl">
                                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                            <div className="bg-red-100 p-1.5 rounded-lg text-red-600">
                                                <Icon name="list-ordered" className="w-5 h-5" />
                                            </div>
                                            Riwayat Pesanan
                                        </h2>
                                        <button 
                                            onClick={exportToCSV}
                                            className="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold py-2.5 px-5 rounded-xl shadow-sm hover:shadow transition flex items-center gap-2 w-full sm:w-auto justify-center"
                                        >
                                            <Icon name="download" className="w-4 h-4" />
                                            Ekspor Data (Excel)
                                        </button>
                                    </div>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse min-w-[500px]">
                                            <thead>
                                                <tr className="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                                                    <th className="p-4 font-bold w-1/4">Waktu</th>
                                                    <th className="p-4 font-bold w-1/2">Menu Pesanan</th>
                                                    <th className="p-4 font-bold">Harga</th>
                                                    <th className="p-4 font-bold text-center w-16">Opsi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {orders.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="4" className="p-12 text-center text-gray-400">
                                                            <div className="flex flex-col items-center gap-3">
                                                                <Icon name="inbox" className="w-12 h-12 text-gray-300" />
                                                                <p>Belum ada data pesanan.</p>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    orders.map((order, index) => {
                                                        const dateObj = new Date(order.timestamp);
                                                        const currentDateString = dateObj.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                                                        
                                                        // Cek apakah ini item pertama, atau apakah tanggalnya beda dengan item sebelumnya
                                                        let showDateSeparator = false;
                                                        if (index === 0) {
                                                            showDateSeparator = true;
                                                        } else {
                                                            const prevDateObj = new Date(orders[index - 1].timestamp);
                                                            const prevDateString = prevDateObj.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                                                            if (currentDateString !== prevDateString) {
                                                                showDateSeparator = true;
                                                            }
                                                        }

                                                        return (
                                                            <React.Fragment key={order.id}>
                                                                {/* Baris Pemisah Tanggal */}
                                                                {showDateSeparator && (
                                                                    <tr className="bg-orange-100/50">
                                                                        <td colSpan="4" className="px-4 py-2 text-center text-sm font-bold text-orange-800 border-y border-orange-200">
                                                                            {currentDateString}
                                                                        </td>
                                                                    </tr>
                                                                )}
                                                                
                                                                {/* Baris Data Pesanan */}
                                                                <tr className="hover:bg-orange-50/50 transition-colors group">
                                                                    <td className="p-4 whitespace-nowrap">
                                                                        <div className="text-sm font-bold text-gray-800">{dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div>
                                                                        <div className="text-xs text-gray-500">{dateObj.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'})}</div>
                                                                    </td>
                                                                    <td className="p-4">
                                                                        <span className="font-semibold text-gray-800 text-sm md:text-base block">{order.name}</span>
                                                                        {order.kasir && (
                                                                            <div className="text-xs text-gray-400 mt-1 flex items-center gap-1">
                                                                                <Icon name="user" className="w-3 h-3" /> {order.kasir}
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-4">
                                                                        <span className="font-bold text-green-600 bg-green-50 px-2 py-1 rounded-md text-sm whitespace-nowrap">{formatRupiah(order.price)}</span>
                                                                    </td>
                                                                    <td className="p-4 text-center align-middle">
                                                                        <button 
                                                                            onClick={() => handleDeleteClick(order.id)}
                                                                            className={`p-2 rounded-lg transition opacity-100 sm:opacity-0 group-hover:opacity-100 focus:opacity-100
                                                                            ${isAuthorized ? 'text-red-500 hover:text-white hover:bg-red-500' : 'text-gray-400 hover:text-red-500 hover:bg-red-50'}`}
                                                                            title={isAuthorized ? "Hapus Langsung" : "Hapus (Perlu PIN Admin)"}
                                                                        >
                                                                            <Icon name="trash-2" className="w-5 h-5" />
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            </React.Fragment>
                                                        );
                                                    })
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* NOTIFIKASI TOAST */}
                    {toast.show && (
                        <div className={`fixed bottom-6 right-6 flex items-center gap-3 text-white px-6 py-4 rounded-xl shadow-2xl animate-bounce z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            <Icon name={toast.type === 'error' ? 'alert-triangle' : 'check-circle'} className="w-6 h-6" />
                            <span className="font-bold">{toast.message}</span>
                        </div>
                    )}

                    {/* MODAL LOGIN ADMIN UNTUK MEMBUKA SEMUA FITUR (Khusus Kasir) */}
                    {showAdminLoginModal && (
                        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform scale-100 transition-transform">
                                <div className="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="shield-check" className="text-orange-600 w-6 h-6" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 text-center mb-2">
                                    Otorisasi Admin
                                </h3>
                                <p className="text-sm text-gray-500 text-center mb-6">
                                    {pendingDeleteId ? "Minta Admin memasukkan PIN untuk menghapus pesanan ini." : "Minta Admin memasukkan PIN untuk membuka laporan keuangan."}
                                </p>
                                
                                <div className="relative mb-2">
                                    <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                                        <Icon name="key" className="w-5 h-5" />
                                    </div>
                                    <input 
                                        type="password" 
                                        ref={passwordInputRef}
                                        value={adminPasswordInput}
                                        onChange={(e) => setAdminPasswordInput(e.target.value)}
                                        placeholder="Masukkan PIN Admin..."
                                        className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition"
                                        onKeyDown={(e) => { if(e.key === 'Enter') handleAdminLogin(); }}
                                    />
                                </div>
                                
                                {adminError && <p className="text-sm text-red-500 mb-4 font-semibold text-center animate-pulse">{adminError}</p>}

                                <div className="flex gap-3 mt-6">
                                    <button 
                                        onClick={cancelAdminLogin}
                                        className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={handleAdminLogin}
                                        className="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition shadow-md shadow-orange-500/30"
                                    >
                                        Buka Akses
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
